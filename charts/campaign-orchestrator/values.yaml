replicaCount: 1

image:
  repository: ghcr.io/intersect-sdk/campaign-orchestrator
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

app:
  production: true
  logLevel: INFO
  baseUrl: ""
  serverWorkers: 1
  # Required credential for API authentication.
  apiKey:
    isSecret: false
    hardcoded: ""
    secretName: ""
    secretKey: ""
  systemName: campaign-orchestrator-system
  minio:
    uri: http://minio:9000
    username: minioadmin
    password:
      isSecret: false
      hardcoded: minioadmin
      secretName: ""
      secretKey: ""

broker:
  host: broker
  port: 5672
  protocol: amqp0.9.1
  username: intersect_username
  password:
    isSecret: false
    hardcoded: intersect_password
    secretName: ""
    secretKey: ""
  tlsCert: ""

campaignRepository:
  backend: memory
  mongo:
    image:
      repository: mongo
      tag: "7.0"
      pullPolicy: IfNotPresent
    auth:
      rootUsername: intersect
      rootPassword:
        isSecret: false
        hardcoded: intersect
        secretName: ""
        secretKey: ""
      database: intersect_orchestrator
    connectionUri:
      # If hardcoded is empty, URI will be auto-generated only when
      # auth.rootPassword.isSecret=false.
      isSecret: false
      hardcoded: ""
      secretName: ""
      secretKey: ""
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
    resources: {}
  postgres:
    image:
      repository: postgres
      tag: "16"
      pullPolicy: IfNotPresent
    auth:
      username: intersect
      password:
        isSecret: false
        hardcoded: intersect
        secretName: ""
        secretKey: ""
      database: intersect_orchestrator
    dsn:
      # If hardcoded is empty, DSN will be auto-generated only when
      # auth.password.isSecret=false.
      isSecret: false
      hardcoded: ""
      secretName: ""
      secretKey: ""
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
    resources: {}
