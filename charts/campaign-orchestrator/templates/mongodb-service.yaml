{{- if eq .Values.campaignRepository.backend "mongo" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-orchestrator.mongo.serviceName" . }}
  labels:
    {{- include "campaign-orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  clusterIP: None
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
      protocol: TCP
  selector:
    {{- include "campaign-orchestrator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
{{- end }}
