{{- if eq .Values.campaignRepository.backend "postgres" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-orchestrator.postgres.serviceName" . }}
  labels:
    {{- include "campaign-orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "campaign-orchestrator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
