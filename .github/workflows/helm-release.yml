name: Helm Chart Release

on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - lint-charts.sh
      - .github/workflows/helm-release.yml
  pull_request:
    branches:
      - main
    paths:
      - charts/**
      - lint-charts.sh
      - .github/workflows/helm-release.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish chart artifacts to GitHub Pages via chart-releaser
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  helm-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint and template charts
        run: ./lint-charts.sh

  helm-release:
    runs-on: ubuntu-latest
    needs: helm-validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: charts
